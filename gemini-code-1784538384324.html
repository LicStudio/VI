<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cuánto falta para VI?</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: url('https://i.imgur.com/ZcTEuG6.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app-container {
            position: relative;
            width: 1000px;
            height: 500px;
        }

        /* Reemplazamos el SVG de la esquina por una imagen flotante normal */
        .corner-image {
            position: absolute;
            top: 20px;
            left: 5px;
            width: 250px;
            opacity: 0.9;
        }

        /* Contenedor flex para que los números se peguen uno al lado del otro */
        #countdown-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            /* gap define el espacio en píxeles entre un número y el siguiente */
            gap: 2px; 
        }

        /* Clase base para cada dígito del sprite */
        .digit {
            background-image: url('numlist.png'); /* Ruta a tu archivo en el repositorio */
            background-repeat: no-repeat;
            /* Cambia esto por el alto total en píxeles de tu imagen numlist.png */
            height: 90px; 
        }

        /* Clase para los dos puntos de separación */
        .colon {
            font-family: sans-serif;
            font-size: 65px;
            color: #FFFFFF;
            font-weight: bold;
            text-shadow: 0px 0px 8px rgba(202, 66, 140, 0.8);
            margin: 0 4px;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Imagen en la esquina -->
        <img src="https://i.imgur.com/ieJFrjE.png" class="corner-image" alt="Corner Art">
        
        <!-- Contador -->
        <div id="countdown-container"></div>
    </div>

    <script>
        const targetDate = new Date("2026-11-19T02:00:00-03:00").getTime();
        const container = document.getElementById('countdown-container');

        /* --- CONFIGURACIÓN DEL SPRITE ---
           Como va del 9 al 0, debes indicar el ancho (width) de cada número.
           El valor 'x' es la posición horizontal de inicio de ese número dentro de la imagen. 
           (Los valores 'x' deben ser negativos porque el fondo se corre hacia la izquierda).
        */
        const spriteMap = {
            '9': { x: 0,    width: 60 },
            '8': { x: -60,  width: 60 },
            '7': { x: -120, width: 60 },
            '6': { x: -180, width: 60 },
            '5': { x: -240, width: 60 },
            '4': { x: -300, width: 60 },
            '3': { x: -360, width: 60 },
            '2': { x: -420, width: 60 },
            '1': { x: -480, width: 40 }, // Aquí configuras que el 1 ocupe menos espacio
            '0': { x: -520, width: 60 }
        };

        // Creamos la estructura HTML inicial una sola vez para no saturar el DOM
        const timeNodes = [];
        const template = "00:00:00:00"; 
        
        for (let char of template) {
            const el = document.createElement('div');
            if (char === ':') {
                el.className = 'colon';
                el.textContent = ':';
            } else {
                el.className = 'digit';
            }
            container.appendChild(el);
            timeNodes.push({ element: el, isDigit: char !== ':' });
        }

        function updateTimer() {
            const now = new Date().getTime();
            let diff = targetDate - now;
            let timeString;

            if (diff <= 0) {
                timeString = "00:00:00:00";
            } else {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                const format = (n) => n.toString().padStart(2, '0');
                timeString = `${format(days)}:${format(hours)}:${format(minutes)}:${format(seconds)}`;
            }

            // Actualizamos la ventana gráfica de cada dígito
            for (let i = 0; i < timeString.length; i++) {
                const node = timeNodes[i];
                const char = timeString[i];
                
                if (node.isDigit) {
                    const config = spriteMap[char];
                    if (config) {
                        node.element.style.backgroundPosition = `${config.x}px 0px`;
                        node.element.style.width = `${config.width}px`;
                    }
                }
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
