<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Fondo y Logo</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            /* Se mantiene el fondo original */
            background: url('https://i.imgur.com/ZcTEuG6.png') no-repeat center center fixed;
            background-size: cover;
        }

        #app-container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        #number-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* Espacio de separación entre los números */
            z-index: 10;
        }

        .sprite-digit {
            background-image: url('numlist.png');
            background-repeat: no-repeat;
            /* El tamaño exacto y la posición se calculan e inyectan en Javascript */
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Se mantiene el SVG para preservar la proporción y ubicación exacta del logo -->
        <svg width="100%" height="100%" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            
            <!-- Imagen en la esquina -->
            <g transform="translate(15, 30)">
                <image xlink:href="https://i.imgur.com/ieJFrjE.png" x="-10" y="-10" width="250" height="180" preserveAspectRatio="xMidYMid meet" opacity="0.9"/>
            </g>
            
        </svg>

        <div id="number-container"></div>
    </div>

    <script>
        // --- CONFIGURACIÓN DEL SPRITESHEET ---
        const ALTURA_ORIGINAL = 1274; // Altura real de tu imagen numlist.png
        const ANCHO_ORIGINAL = 10003; // Ancho total real de tu imagen numlist.png
        const ALTURA_MOSTRAR = 180;   // Tamaño (en alto) en el que quieres que se vean en pantalla
        
        // El orden exacto en el que aparecen los números en tu imagen (de izquierda a derecha)
        const ORDEN_SPRITES = [9, 8, 7, 6, 5, 4, 3, 2, 1, 0];

        // IMPORTANTE: Sumados, deberían dar los 10003px. Aquí puse un promedio de 1000px por número, 
        // pero debes ajustarlos (restar a uno y sumar a otro) si notas que un número corta al otro.
        const ANCHOS_ORIGINALES = {
            9: 1034,
            8: 1018,
            7: 1084,
            6: 1034,
            5: 1018,
            4: 1101, // Ejemplo: el 4 suele requerir más espacio
            3: 1018,
            2: 1018,
            1: 660, // Ejemplo: el 1 es mucho más delgado
            0: 1018
        };

        function renderizarNumero(numeroString) {
            const container = document.getElementById('number-container');
            container.innerHTML = '';

            // 1. Calcular las posiciones X (desplazamiento) de cada número dinámicamente sumando los anchos
            let offsetXActual = 0;
            const posicionesX = {};
            
            ORDEN_SPRITES.forEach(num => {
                posicionesX[num] = offsetXActual;
                // Sumamos el ancho del número actual para saber dónde empieza el siguiente
                offsetXActual += ANCHOS_ORIGINALES[num]; 
            });
            
            const anchoTotalImagen = offsetXActual;

            // 2. Calcular la proporción de escala (achicar de 1274px a 180px)
            const escala = ALTURA_MOSTRAR / ALTURA_ORIGINAL;

            // 3. Crear un elemento HTML por cada dígito del número solicitado
            for (let i = 0; i < numeroString.length; i++) {
                const digito = parseInt(numeroString[i], 10);
                if (isNaN(digito)) continue;

                const div = document.createElement('div');
                div.className = 'sprite-digit';

                const anchoOriginal = ANCHOS_ORIGINALES[digito];
                const offsetOriginalX = posicionesX[digito];

                // Aplicamos la escala al ancho y al desplazamiento
                const anchoFinal = anchoOriginal * escala;
                const offsetFinalX = offsetOriginalX * escala;
                
                // AQUÍ ESTÁ LA SOLUCIÓN:
                // Forzamos al tamaño de fondo a usar siempre el ANCHO TOTAL REAL de 10003px escalado.
                // Esto garantiza que la imagen de fondo jamás se estire o se deforme.
                const anchoFondoFinal = ANCHO_ORIGINAL * escala; 
                const altoFondoFinal = ALTURA_MOSTRAR; 

                // Asignamos los estilos para recortar y mostrar exactamente ese dígito
                div.style.width = `${anchoFinal}px`;
                div.style.height = `${ALTURA_MOSTRAR}px`;
                div.style.backgroundSize = `${anchoFondoFinal}px ${altoFondoFinal}px`;
                div.style.backgroundPosition = `-${offsetFinalX}px 0px`;

                container.appendChild(div);
            }
        }

        // Llamamos a la función para mostrar el número deseado
        renderizarNumero("149");
    </script>
</body>
</html>
