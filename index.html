<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Fondo, Logo y Sprites</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            /* Se mantiene el fondo original */
            background: url('https://i.imgur.com/ZcTEuG6.png') no-repeat center center fixed;
            background-size: cover;
        }

        #app-container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; /* Agregado para poder superponer los números */
        }

        /* Contenedor donde se van a inyectar los números */
        #score-container {
            display: flex;
            position: absolute;
            /* Centrado absoluto, podés ajustar esto para mover el texto por la pantalla */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            gap: 0;
        }

        .sprite-digit {
            /* REEMPLAZÁ ESTA URL POR LA RUTA DE TU SPRITE SHEET EN GITHUB PAGES */
            background-image: url('numlist.png'); 
            background-repeat: no-repeat;
            display: block; /* Evita los espacios del inline-block */
            image-rendering: auto; 
            image-rendering: high-quality;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Se mantiene el SVG para preservar la proporción y ubicación exacta del logo -->
        <svg width="100%" height="100%" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <g transform="translate(15, 30)">
                <image xlink:href="https://i.imgur.com/ieJFrjE.png" x="-10" y="-10" width="250" height="180" preserveAspectRatio="xMidYMid meet" opacity="0.9"/>
            </g>
        </svg>

        <!-- Acá va a aparecer la secuencia de números -->
        <div id="score-container"></div>
    </div>

    <script>
        // Diccionario con la posición X de inicio y el ancho original de cada número
        const spriteData = {
            '9': { x: 0, w: 1034 },
            '8': { x: 1034, w: 1018 },
            '7': { x: 2052, w: 1084 },
            '6': { x: 3136, w: 1034 },
            '5': { x: 4170, w: 1018 },
            '4': { x: 5188, w: 1101 },
            '3': { x: 6289, w: 1018 },
            '2': { x: 7307, w: 1018 },
            '1': { x: 8325, w: 660 },
            '0': { x: 8985, w: 1018 }
        };

        const spriteOriginalHeight = 1274;
        const spriteTotalWidth = 10003; 

        // CONFIGURACIÓN: Modificá este valor para hacer los números más grandes o más chicos en pantalla
        const targetHeight = 156; // altura en píxeles

        // Factor matemático para achicar ancho y posición sin perder proporción
        const scale = targetHeight / spriteOriginalHeight;

        function renderSpriteText(text, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Limpiar el contenedor por si se actualiza el número

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                if (spriteData[char]) {
                    const digitDiv = document.createElement('div');
                    digitDiv.className = 'sprite-digit';
                    
                    // Escalamos las propiedades CSS
                    const scaledWidth = spriteData[char].w * scale;
                    const scaledBgWidth = spriteTotalWidth * scale;
                    const scaledPosX = spriteData[char].x * scale;

                    digitDiv.style.width = `${scaledWidth}px`;
                    digitDiv.style.height = `${targetHeight}px`;
                    digitDiv.style.backgroundSize = `${scaledBgWidth}px ${targetHeight}px`;
                    digitDiv.style.backgroundPosition = `-${scaledPosX}px 0px`;

                    container.appendChild(digitDiv);
                } else {
                    // Si le pasás un espacio, dibuja un hueco vacío
                    const space = document.createElement('div');
                    space.style.width = `${400 * scale}px`; 
                    space.style.height = `${targetHeight}px`;
                    container.appendChild(space);
                }
            }
        }

        // Llamamos a la función con el texto exacto que pediste
        // Fecha objetivo: Año 2026, Mes 10 (Noviembre, porque enero es 0), Día 19, 00:00:00 horas
        const targetDate = new Date(2026, 10, 19, 0, 0, 0); 

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate.getTime() - now.getTime();

            // Si ya pasó la fecha, dejamos todo en ceros
            if (diff <= 0) {
                renderSpriteText("00 00 00 00", "score-container");
                return;
            }

            // Cálculos matemáticos para extraer días, horas, minutos y segundos
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // padStart(2, '0') asegura que siempre haya 2 dígitos (ej: "05" en vez de "5")
            const strD = String(d).padStart(2, '0');
            const strH = String(h).padStart(2, '0');
            const strM = String(m).padStart(2, '0');
            const strS = String(s).padStart(2, '0');

            // Armamos el texto con los espacios en el medio
            const timeString = `${strD} ${strH} ${strM} ${strS}`;
            
            // Dibujamos los sprites
            renderSpriteText(timeString, "score-container");
        }

        // Ejecutamos inmediatamente para que no haya retraso al cargar la página
        updateCountdown();
        
        // Actualizamos cada 1 segundo (1000 milisegundos)
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
